<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!--
    Three concentric circular arrows — one per "o" in "Looop".
    Each arc spans 300° clockwise, starting at 12 o'clock (270°) and ending at
    the 10 o'clock position (210°). All arrowheads point in the same direction
    (−60° from the x-axis) and align along the 210° radius, reinforcing the
    sense of a single unified loop rotating inward.

    Outer  r=46  sky-blue  #38bdf8
    Middle r=32  indigo    #818cf8
    Inner  r=18  violet    #c084fc
  -->

  <!-- Outer loop -->
  <path d="M 64 18 A 46 46 0 1 1 24.2 41"
    stroke="#38bdf8" stroke-width="6" fill="none" stroke-linecap="round"/>
  <polygon points="0,0 -9,-4.5 -9,4.5" fill="#38bdf8"
    transform="translate(24.2,41) rotate(-60)"/>

  <!-- Middle loop -->
  <path d="M 64 32 A 32 32 0 1 1 36.3 48"
    stroke="#818cf8" stroke-width="6" fill="none" stroke-linecap="round"/>
  <polygon points="0,0 -7,-3.5 -7,3.5" fill="#818cf8"
    transform="translate(36.3,48) rotate(-60)"/>

  <!-- Inner loop -->
  <path d="M 64 46 A 18 18 0 1 1 48.4 55"
    stroke="#c084fc" stroke-width="6" fill="none" stroke-linecap="round"/>
  <polygon points="0,0 -5,-2.5 -5,2.5" fill="#c084fc"
    transform="translate(48.4,55) rotate(-60)"/>
</svg>
